<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RA por Marcador — Modelo 3D animado</title>

  <!-- 1) Librería A-Frame: motor 3D para la web -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- 2) Librería AR.js (versión para A-Frame): añade la realidad aumentada -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }

    /* Aviso flotante con instrucciones para el usuario */
    #aviso {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: rgba(15, 23, 42, 0.85);
      color: #f1f5f9;
      padding: 12px 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
    }
    #aviso b { color: #38bdf8; }
    #aviso a { color: #38bdf8; }
  </style>
</head>
<body>

  <!-- Mensaje guía: dónde conseguir el marcador Hiro -->
  <div id="aviso">
    Apunta la cámara al marcador <b>Hiro</b>.
    Imprímelo o ábrelo en otra pantalla:
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">ver marcador</a>
  </div>

  <!-- 3) Escena de A-Frame + AR.js -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false;">

    <!-- 4) Precarga de recursos (el modelo 3D) -->
    <a-assets>
      <a-asset-item id="modelo"
        src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/Duck/glTF-Binary/Duck.glb">
      </a-asset-item>
    </a-assets>

    <!-- 5) Marcador 'hiro': todo lo que esté adentro aparece sobre él -->
    <a-marker preset="hiro">

      <!-- 6) Modelo 3D animado, ajustado en escala, posición y rotación -->
      <a-entity
        gltf-model="#modelo"
        scale="0.5 0.5 0.5"
        position="0 0 0"
        rotation="0 0 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
      </a-entity>

    </a-marker>

    <!-- 7) Cámara de la escena -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
