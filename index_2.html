<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RA — Dragón que escupe fuego</title>

  <!-- 1) A-Frame: motor 3D para la web -->
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <!-- 2) AR.js: realidad aumentada sobre A-Frame -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; }

    #aviso {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      background: rgba(15, 23, 42, 0.85);
      color: #f1f5f9;
      padding: 12px 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
    }
    #aviso b { color: #fb923c; }
    #aviso a { color: #fb923c; }
  </style>
</head>
<body>

  <div id="aviso">
    Apunta la cámara al marcador <b>Hiro</b>.
    Imprímelo o ábrelo en otra pantalla:
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">ver marcador</a>
  </div>

  <!-- 3) Escena AR -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    arjs="sourceType: webcam; detectionMode: mono; debugUIEnabled: false;">

    <!-- 4) Precarga del modelo del dragon (publico y libre, Khronos) -->
    <a-assets>
      <a-asset-item id="dragon"
        src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb">
      </a-asset-item>
    </a-assets>

    <!-- 5) Marcador Hiro -->
    <a-marker preset="hiro">

      <!-- Grupo que gira completo: dragon + jinete + fuego giran juntos -->
      <a-entity
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear">

        <!-- 6) DRAGON: mas grande (escala 2.5) -->
        <a-entity
          gltf-model="#dragon"
          scale="2.5 2.5 2.5"
          position="0 0 0"
          rotation="0 -90 0">
        </a-entity>

        <!-- 7) FUEGO: cono naranja que "sale" del frente, con parpadeo -->
        <a-cone
          color="#ff6a00"
          radius-bottom="0.05"
          radius-top="0.45"
          height="1.6"
          position="1.2 0.9 0"
          rotation="0 0 -90"
          opacity="0.85"
          material="emissive: #ff3d00; emissiveIntensity: 1.2"
          animation="property: scale; to: 1.25 1.25 1.25; dir: alternate; loop: true; dur: 250">
        </a-cone>
        <!-- Nucleo amarillo del fuego -->
        <a-cone
          color="#ffd000"
          radius-bottom="0.02"
          radius-top="0.22"
          height="1.1"
          position="1.1 0.9 0"
          rotation="0 0 -90"
          opacity="0.95"
          material="emissive: #ffea00; emissiveIntensity: 1.5"
          animation="property: scale; to: 1.4 1.4 1.4; dir: alternate; loop: true; dur: 180">
        </a-cone>

        <!-- 8) JINETE generico: cuerpo (cilindro) + cabeza (esfera) sobre el lomo -->
        <a-entity position="0 1.1 0">
          <a-cylinder color="#3b2a1a" radius="0.18" height="0.6" position="0 0.3 0"></a-cylinder>
          <a-sphere color="#c9a27e" radius="0.16" position="0 0.75 0"></a-sphere>
          <!-- Globo de texto del jinete -->
          <a-entity
            position="0 1.3 0"
            text="value: !Drakaris!; align: center; color: #ff6a00; width: 5; font: exo2bold"
            look-at="[camera]">
          </a-entity>
        </a-entity>

      </a-entity>

      <!-- 9) Texto flotante con TU NOMBRE (no gira, queda fijo arriba) -->
      <a-entity
        position="0 2.6 0"
        text="value: Jonas; align: center; color: #ffffff; width: 7; font: exo2bold"
        look-at="[camera]">
      </a-entity>

      <!-- 10) LUCES para iluminar bien el modelo -->
      <a-light type="ambient" color="#666"></a-light>
      <a-light type="directional" color="#fff" intensity="1.1" position="2 4 3"></a-light>
      <!-- Luz calida tipo "fuego" desde abajo -->
      <a-light type="point" color="#ff6a00" intensity="1.4" distance="6" position="1 0.8 0"></a-light>

    </a-marker>

    <!-- 11) Camara -->
    <a-entity camera></a-entity>

  </a-scene>

</body>
</html>
